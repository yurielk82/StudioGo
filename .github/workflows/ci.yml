name: CI

on:
  push:
    branches: [main, 'auto-*']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: 품질 검증
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: TypeScript 타입 체크
        run: npm run typecheck
      - name: ESLint
        run: npm run lint
      - name: 테스트
        run: npm test
